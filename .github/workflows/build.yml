name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install SDKs
        run: |
          git clone https://github.com/theos/sdks.git $HOME/sdks
          cp -r $HOME/sdks/*.sdk $HOME/theos/sdks/

      - name: Build package
        run: |
          make package FINALPACKAGE=1

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: packages/*.deb